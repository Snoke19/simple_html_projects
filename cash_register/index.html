<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Cash Register</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="./styles.css"/>
</head>

<body>
<div class="app-container">
    <header class="header">
        <div class="logo">
            <i class="fas fa-cash-register"></i>
            <h1>Cash Register</h1>
        </div>
        <div class="header-controls">
            <button id="theme-toggle" class="icon-btn" title="Toggle theme">
                <i class="fas fa-moon"></i>
            </button>
            <button id="reset-btn" class="icon-btn" title="Reset drawer">
                <i class="fas fa-redo"></i>
            </button>
        </div>
    </header>

    <main class="main-content">
        <section class="products-section">
            <h2><i class="fas fa-box-open"></i> Products</h2>
            <div class="products-grid" id="products-grid"></div>
            <div class="total-display">
                <span>Total:</span>
                <span id="total-amount">$0.00</span>
            </div>
        </section>

        <section class="register-section">
            <div class="register-container">
                <div class="display-screen">
                    <div class="screen-content">
                        <div class="item-display" id="item-display">Select a product</div>
                        <div class="price-display" id="price-display">$0.00</div>
                    </div>
                </div>

                <div class="input-section">
                    <div class="input-group">
                        <label for="cash-input">Cash Received:</label>
                        <div class="input-wrapper">
                            <span class="currency-symbol">$</span>
                            <input
                                    type="number"
                                    id="cash-input"
                                    class="cash-input"
                                    placeholder="0.00"
                                    step="0.01"
                                    min="0"
                            />
                        </div>
                    </div>
                    <button id="purchase-btn" class="purchase-btn">
                        <i class="fas fa-shopping-cart"></i> Complete Sale
                    </button>
                </div>

                <div class="drawer-display" id="drawer-display">
                    <h3><i class="fas fa-dollar-sign"></i> Cash Drawer</h3>
                    <div class="drawer-contents" id="drawer-contents"></div>
                    <div class="drawer-total">
                        <span>Total in Drawer:</span>
                        <span id="drawer-total">$0.00</span>
                    </div>
                </div>

                <div class="drawer-toggle-container">
                    <button id="drawer-toggle" class="drawer-toggle">
                        <i class="fas fa-chevron-down"></i>
                    </button>
                </div>
            </div>
        </section>

        <section class="transactions-section">
            <h2><i class="fas fa-history"></i> Transaction History</h2>
            <div class="transactions-list" id="transactions-list">
                <div class="empty-state">
                    <i class="fas fa-receipt"></i>
                    <p>No transactions yet</p>
                </div>
            </div>
            <button id="clear-history-btn" class="clear-btn">
                <i class="fas fa-trash"></i> Clear History
            </button>
        </section>
    </main>

    <div class="modal" id="change-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Change Due</h3>
                <button class="modal-close" id="modal-close">&times;</button>
            </div>
            <div class="modal-body" id="change-results"></div>
            <div class="modal-footer">
                <button id="print-receipt-btn" class="btn btn-secondary">
                    <i class="fas fa-print"></i> Print Receipt
                </button>
                <button id="close-modal-btn" class="btn btn-primary">
                    <i class="fas fa-check"></i> OK
                </button>
            </div>
        </div>
    </div>

    <div class="modal" id="receipt-modal">
        <div class="modal-content receipt-content">
            <div class="modal-header">
                <h3>Receipt</h3>
                <button class="modal-close" id="receipt-modal-close">&times;</button>
            </div>
            <div class="modal-body" id="receipt-preview"></div>
            <div class="modal-footer">
                <button id="print-receipt-final" class="btn btn-primary">
                    <i class="fas fa-print"></i> Print
                </button>
                <button id="close-receipt-modal" class="btn btn-secondary">
                    Close
                </button>
            </div>
        </div>
    </div>

    <div class="notification" id="notification">
        <i class="fas fa-check-circle"></i>
        <span id="notification-message"></span>
    </div>
</div>

<script type="module" src="./script.js"></script>
</body>

</html>
